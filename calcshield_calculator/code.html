<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>CalcShield - Stealth Calculator</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#ffb868",
                    "secondary-container": "#474649",
                    "primary-fixed": "#ffddbb",
                    "on-primary": "#482900",
                    "secondary-fixed-dim": "#c8c6c8",
                    "on-secondary-fixed": "#1b1b1d",
                    "inverse-on-surface": "#2f3131",
                    "outline": "#a28d79",
                    "surface-container-lowest": "#0d0e0f",
                    "on-tertiary-fixed-variant": "#474649",
                    "primary-fixed-dim": "#ffb868",
                    "secondary-fixed": "#e4e2e4",
                    "surface-bright": "#383939",
                    "on-error": "#690005",
                    "on-tertiary-container": "#464648",
                    "surface-container": "#1e2020",
                    "on-background": "#e3e2e2",
                    "surface": "#121414",
                    "surface-container-highest": "#343535",
                    "on-surface": "#e3e2e2",
                    "error-container": "#93000a",
                    "surface-container-low": "#1a1c1c",
                    "error": "#ffb4ab",
                    "tertiary-container": "#b6b4b6",
                    "on-primary-fixed-variant": "#673d00",
                    "tertiary-fixed": "#e4e2e4",
                    "on-secondary-container": "#b6b4b7",
                    "on-surface-variant": "#dac3ad",
                    "secondary": "#c8c6c8",
                    "primary": "#ffc688",
                    "inverse-surface": "#e3e2e2",
                    "on-error-container": "#ffdad6",
                    "outline-variant": "#544433",
                    "tertiary": "#d2d0d2",
                    "on-secondary": "#303032",
                    "on-primary-fixed": "#2b1700",
                    "inverse-primary": "#885200",
                    "primary-container": "#ff9f0a",
                    "background": "#121414",
                    "on-tertiary-fixed": "#1b1b1d",
                    "surface-container-high": "#292a2a",
                    "on-tertiary": "#303032",
                    "on-secondary-fixed-variant": "#474649",
                    "tertiary-fixed-dim": "#c8c6c8",
                    "surface-variant": "#343535",
                    "on-primary-container": "#673d00",
                    "surface-dim": "#121414"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter-grid": "12px",
                    "margin-main": "16px",
                    "stack-gap": "8px",
                    "section-padding": "24px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "display-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "caption": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["15px", {"lineHeight": "20px", "letterSpacing": "-0.24px", "fontWeight": "400"}],
                    "label-sm": ["13px", {"lineHeight": "18px", "letterSpacing": "-0.08px", "fontWeight": "400"}],
                    "display-lg": ["94px", {"lineHeight": "112px", "letterSpacing": "-0.02em", "fontWeight": "300"}],
                    "headline-md": ["22px", {"lineHeight": "28px", "letterSpacing": "0.35px", "fontWeight": "600"}],
                    "headline-lg": ["34px", {"lineHeight": "41px", "letterSpacing": "0.37px", "fontWeight": "700"}],
                    "caption": ["11px", {"lineHeight": "13px", "letterSpacing": "0.06px", "fontWeight": "500"}],
                    "body-lg": ["17px", {"lineHeight": "22px", "letterSpacing": "-0.41px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
    <style>
        body {
            background-color: #000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .phone-frame {
            width: 393px;
            height: 852px;
            background: #000;
            border-radius: 54px;
            position: relative;
            box-shadow: 0 0 0 11px #1f1f1f, 0 0 0 13px #333, 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .dynamic-island {
            width: 120px;
            height: 35px;
            background: #000;
            border-radius: 20px;
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .calc-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 20px 30px;
            background-color: transparent;
        }

        .calc-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            transition: filter 0.1s ease;
        }

        .calc-btn:active {
            filter: brightness(1.5);
        }

        /* iOS Calculator Colors */
        .btn-utility { background-color: #A2A2A2; color: #000; }
        .btn-number { background-color: #333333; color: #FFF; }
        .btn-operator { background-color: #FF9F0A; color: #FFF; }
        
        .btn-zero {
            width: 172px;
            border-radius: 40px;
            justify-content: flex-start;
            padding-left: 32px;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-black">
    <div class="phone-frame">
        <!-- Dynamic Island with Mic stealth indicator dot -->
        <div class="dynamic-island flex items-center justify-end px-3 gap-1.5 pointer-events-none">
            <div id="mic-indicator" class="w-2.5 h-2.5 rounded-full bg-green-500 hidden animate-pulse"></div>
        </div>

        <!-- Top Notification Toast Overlay -->
        <div id="ios-toast" class="absolute top-14 left-4 right-4 bg-white/10 backdrop-blur-xl border border-white/10 py-3.5 px-5 rounded-2xl flex items-center gap-3.5 z-[9999] -translate-y-24 opacity-0 transition-all duration-300 pointer-events-none shadow-xl">
            <div class="bg-green-500 w-7 h-7 rounded-full flex items-center justify-center shadow-md">
                <span class="material-symbols-outlined text-white text-[16px] font-bold">check</span>
            </div>
            <p id="ios-toast-msg" class="text-[14px] font-medium text-white"></p>
        </div>

        <!-- Simulated Call Overlay -->
        <div id="emergency-call-overlay" class="absolute inset-0 bg-black/95 z-[999] flex flex-col justify-between py-16 px-8 hidden transition-opacity duration-300 opacity-0">
            <div class="flex flex-col items-center mt-12">
                <div class="w-20 h-20 rounded-full bg-red-600 flex items-center justify-center mb-4 animate-pulse">
                    <span class="material-symbols-outlined text-white text-[48px]">call</span>
                </div>
                <h2 class="text-[30px] font-semibold text-white tracking-wide">Emergency Services</h2>
                <p id="call-status" class="text-on-surface-variant text-[17px] mt-1">Calling...</p>
            </div>
            
            <div class="grid grid-cols-3 gap-y-8 gap-x-4 max-w-xs mx-auto text-center mt-10">
                <div class="flex flex-col items-center">
                    <button class="w-16 h-16 rounded-full bg-white/10 active:bg-white/20 flex items-center justify-center text-white mb-2">
                        <span class="material-symbols-outlined text-[28px]">mic_off</span>
                    </button>
                    <span class="text-[12px] text-white/70">Mute</span>
                </div>
                <div class="flex flex-col items-center">
                    <button class="w-16 h-16 rounded-full bg-white/10 active:bg-white/20 flex items-center justify-center text-white mb-2">
                        <span class="material-symbols-outlined text-[28px]">keypad</span>
                    </button>
                    <span class="text-[12px] text-white/70">Keypad</span>
                </div>
                <div class="flex flex-col items-center">
                    <button class="w-16 h-16 rounded-full bg-white/10 active:bg-white/20 flex items-center justify-center text-white mb-2">
                        <span class="material-symbols-outlined text-[28px]">volume_up</span>
                    </button>
                    <span class="text-[12px] text-white/70">Speaker</span>
                </div>
                <div class="flex flex-col items-center">
                    <button class="w-16 h-16 rounded-full bg-white/10 active:bg-white/20 flex items-center justify-center text-white mb-2">
                        <span class="material-symbols-outlined text-[28px]">add</span>
                    </button>
                    <span class="text-[12px] text-white/70">Add Call</span>
                </div>
                <div class="flex flex-col items-center opacity-40">
                    <button class="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center text-white mb-2" disabled>
                        <span class="material-symbols-outlined text-[28px]">videocam</span>
                    </button>
                    <span class="text-[12px] text-white/70">FaceTime</span>
                </div>
                <div class="flex flex-col items-center">
                    <button class="w-16 h-16 rounded-full bg-white/10 active:bg-white/20 flex items-center justify-center text-white mb-2">
                        <span class="material-symbols-outlined text-[28px]">contacts</span>
                    </button>
                    <span class="text-[12px] text-white/70">Contacts</span>
                </div>
            </div>

            <div class="flex justify-center mb-8">
                <button onclick="endEmergencyCall()" class="w-20 h-20 rounded-full bg-red-500 hover:bg-red-600 flex items-center justify-center text-white active:scale-95 transition-transform shadow-lg shadow-red-500/30">
                    <span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">call_end</span>
                </button>
            </div>
        </div>

        <!-- TopAppBar -->
        <header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-14 pointer-events-none">
            <button onclick="navigateSettings()" class="pointer-events-auto active:opacity-40 transition-opacity">
                <span class="material-symbols-outlined text-surface-container-highest !text-[20px]" data-icon="settings">settings</span>
            </button>
            <button class="pointer-events-auto active:opacity-40 transition-opacity">
                <span class="material-symbols-outlined text-surface-container-highest !text-[20px]" data-icon="history">history</span>
            </button>
        </header>

        <!-- Main Calculator Canvas -->
        <main class="flex-1 flex flex-col pt-20 pb-8 px-4">
            <!-- Result Area -->
            <div class="calc-display">
                <div class="font-display-lg text-display-lg text-white text-right break-all" id="display-value">0</div>
            </div>
            <!-- Buttons Grid -->
            <div class="grid grid-cols-4 gap-3 mt-4 mb-4">
                <!-- Row 1 -->
                <div class="calc-btn btn-utility" onclick="clearDisplay()">AC</div>
                <div class="calc-btn btn-utility" onclick="toggleSign()">+/-</div>
                <div class="calc-btn btn-utility" onclick="onPercentClick()">%</div>
                <div class="calc-btn btn-operator" onclick="appendOperator('/')">÷</div>
                <!-- Row 2 -->
                <div class="calc-btn btn-number" onclick="appendNumber('7')">7</div>
                <div class="calc-btn btn-number" onclick="appendNumber('8')">8</div>
                <div class="calc-btn btn-number" onclick="appendNumber('9')">9</div>
                <div class="calc-btn btn-operator" onclick="appendOperator('x')">×</div>
                <!-- Row 3 -->
                <div class="calc-btn btn-number" onclick="appendNumber('4')">4</div>
                <div class="calc-btn btn-number" onclick="appendNumber('5')">5</div>
                <div class="calc-btn btn-number" onclick="appendNumber('6')">6</div>
                <div class="calc-btn btn-operator" onclick="appendOperator('-')">−</div>
                <!-- Row 4 -->
                <div class="calc-btn btn-number" onclick="appendNumber('1')">1</div>
                <div class="calc-btn btn-number" onclick="appendNumber('2')">2</div>
                <div class="calc-btn btn-number" onclick="appendNumber('3')">3</div>
                <div class="calc-btn btn-operator" onclick="appendOperator('+')">+</div>
                <!-- Row 5 -->
                <div class="col-span-2">
                    <div class="calc-btn btn-number btn-zero" onclick="appendNumber('0')">0</div>
                </div>
                <div class="calc-btn btn-number" onclick="appendNumber('.')">.</div>
                <div class="calc-btn btn-operator" onclick="calculate()">=</div>
            </div>
        </main>
        
        <!-- Bottom Safe Area Indicator -->
        <div class="h-1.5 w-32 bg-white/30 mx-auto mb-2 rounded-full"></div>
    </div>

    <script>
        let currentInput = "0";
        let previousInput = "";
        let operator = null;
        let shouldResetScreen = false;
        
        let equalPressCount = 0;
        let lastPressTime = 0;

        let mediaRecorder = null;
        let audioChunks = [];

        const displayElement = document.getElementById('display-value');

        // Check SOS and Recording status on page load
        window.addEventListener('load', () => {
            const sosActive = localStorage.getItem('sos_active') === 'true';
            const isRecording = localStorage.getItem('is_recording') === 'true';
            const micIndicator = document.getElementById('mic-indicator');

            if (sosActive && isRecording) {
                if (micIndicator) micIndicator.classList.remove('hidden');
            }
        });

        function updateDisplay() {
            let formatted = currentInput;
            if (formatted.length > 9) {
                formatted = parseFloat(formatted).toExponential(3);
            }
            displayElement.innerText = formatted;
            
            if (currentInput.length > 6) {
                displayElement.style.fontSize = '60px';
            } else {
                displayElement.style.fontSize = '94px';
            }
        }

        function appendNumber(number) {
            if (currentInput === "0" || shouldResetScreen) {
                currentInput = number;
                shouldResetScreen = false;
            } else {
                if (currentInput.length < 9) {
                    currentInput += number;
                }
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (operator !== null) calculate();
            previousInput = currentInput;
            operator = op;
            shouldResetScreen = true;
        }

        function clearDisplay() {
            currentInput = "0";
            previousInput = "";
            operator = null;
            shouldResetScreen = false;
            updateDisplay();
        }

        function calculate() {
            // SOS Trigger Check (pressing = three times consecutively or entering ===)
            const now = Date.now();
            if (now - lastPressTime < 1500) {
                equalPressCount++;
            } else {
                equalPressCount = 1;
            }
            lastPressTime = now;

            if (currentInput === "===" || equalPressCount >= 3) {
                triggerSOS();
                equalPressCount = 0;
                return;
            }

            if (operator === null || shouldResetScreen) return;
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);

            switch (operator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case 'x': result = prev * current; break;
                case '/': result = prev / current; break;
                case '%': result = prev % current; break;
                default: return;
            }

            currentInput = result.toString();
            operator = null;
            shouldResetScreen = true;
            updateDisplay();
        }

        function toggleSign() {
            currentInput = (parseFloat(currentInput) * -1).toString();
            updateDisplay();
        }

        // Settings Navigation Logic
        function navigateSettings() {
            const sosActive = localStorage.getItem('sos_active') === 'true';
            if (sosActive) {
                window.location.href = '../emergency_settings/code.html';
            } else {
                window.location.href = '../settings/code.html';
            }
        }

        // Trigger SOS Protocol
        function triggerSOS() {
            localStorage.setItem('sos_active', 'true');
            currentInput = "0";
            updateDisplay();
            
            // Show Call Overlay immediately
            const callOverlay = document.getElementById('emergency-call-overlay');
            if (callOverlay) {
                callOverlay.classList.remove('hidden');
                setTimeout(() => {
                    callOverlay.classList.remove('opacity-0');
                    callOverlay.classList.add('opacity-100');
                }, 10);
            }
            
            // Simulate simulated outgoing call timer
            let seconds = 0;
            const statusElement = document.getElementById('call-status');
            window.callTimerInterval = setInterval(() => {
                seconds++;
                let min = Math.floor(seconds / 60).toString().padStart(2, '0');
                let sec = (seconds % 60).toString().padStart(2, '0');
                if (statusElement) {
                    statusElement.innerText = `${min}:${sec}`;
                }
            }, 1000);

            showStatusToast("🚨 SOS Mode Activated. Calling Emergency Services.");
        }

        function endEmergencyCall() {
            clearInterval(window.callTimerInterval);
            const callOverlay = document.getElementById('emergency-call-overlay');
            if (callOverlay) {
                callOverlay.classList.remove('opacity-100');
                callOverlay.classList.add('opacity-0');
                setTimeout(() => {
                    callOverlay.classList.add('hidden');
                }, 300);
            }
            showStatusToast("Call simulation closed. Settings is now unlocked in SOS mode.");
        }

        // Stealth % Key Audio Recording Toggle
        function onPercentClick() {
            if (handlePercentPress()) return;
            appendOperator('%');
        }

        function handlePercentPress() {
            const sosActive = localStorage.getItem('sos_active') === 'true';
            if (sosActive) {
                toggleStealthRecording();
                return true; // handled
            }
            return false; // normal calculator behavior
        }

        async function toggleStealthRecording() {
            const isRecording = localStorage.getItem('is_recording') === 'true';
            const micIndicator = document.getElementById('mic-indicator');

            if (isRecording) {
                // Stop Recording
                localStorage.setItem('is_recording', 'false');
                if (micIndicator) micIndicator.classList.add('hidden');
                
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
                showStatusToast("🎙️ Stealth Recording Saved to Secure Folder.");
            } else {
                // Start Recording
                localStorage.setItem('is_recording', 'true');
                if (micIndicator) micIndicator.classList.remove('hidden');
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (e) => {
                        audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            const base64Audio = reader.result;
                            let recordings = JSON.parse(localStorage.getItem('stealth_recordings') || '[]');
                            recordings.push({
                                timestamp: new Date().toLocaleString(),
                                data: base64Audio,
                                duration: 'Recorded'
                            });
                            localStorage.setItem('stealth_recordings', JSON.stringify(recordings));
                        };

                        // Stop micro track
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    showStatusToast("🎙️ Stealth Audio Recording Started.");
                } catch (err) {
                    console.log("Mic permission denied, continuing with high-fidelity simulated recording.");
                    showStatusToast("🎙️ Stealth Audio Recording Started (Simulated).");
                }
            }
        }

        // Status Slide-down Notification Toast
        function showStatusToast(message) {
            const toast = document.getElementById('ios-toast');
            const toastMsg = document.getElementById('ios-toast-msg');
            if (toast && toastMsg) {
                toastMsg.innerText = message;
                toast.classList.remove('-translate-y-24', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
                setTimeout(() => {
                    toast.classList.remove('translate-y-0', 'opacity-100');
                    toast.classList.add('-translate-y-24', 'opacity-0');
                }, 3000);
            }
        }

        // Haptic-like visual feedback on keyboard (Desktop preview)
        window.addEventListener('keydown', (e) => {
            if (e.key >= 0 && e.key <= 9) appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '=') calculate();
            if (e.key === 'Enter') calculate();
            if (e.key === 'Escape') clearDisplay();
            if (e.key === '%') {
                if (handlePercentPress()) {
                    e.preventDefault();
                    return;
                }
                appendOperator('%');
            }
        });
    </script>
</body>
</html>
