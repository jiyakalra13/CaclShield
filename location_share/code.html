<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#ffb868",
                    "secondary-container": "#474649",
                    "primary-fixed": "#ffddbb",
                    "on-primary": "#482900",
                    "secondary-fixed-dim": "#c8c6c8",
                    "on-secondary-fixed": "#1b1b1d",
                    "inverse-on-surface": "#2f3131",
                    "outline": "#a28d79",
                    "surface-container-lowest": "#0d0e0f",
                    "on-tertiary-fixed-variant": "#474649",
                    "primary-fixed-dim": "#ffb868",
                    "secondary-fixed": "#e4e2e4",
                    "surface-bright": "#383939",
                    "on-error": "#690005",
                    "on-tertiary-container": "#464648",
                    "surface-container": "#1e2020",
                    "on-background": "#e3e2e2",
                    "surface": "#121414",
                    "surface-container-highest": "#343535",
                    "on-surface": "#e3e2e2",
                    "error-container": "#93000a",
                    "surface-container-low": "#1a1c1c",
                    "error": "#ffb4ab",
                    "tertiary-container": "#b6b4b6",
                    "on-primary-fixed-variant": "#673d00",
                    "tertiary-fixed": "#e4e2e4",
                    "on-secondary-container": "#b6b4b7",
                    "on-surface-variant": "#dac3ad",
                    "secondary": "#c8c6c8",
                    "primary": "#ffc688",
                    "inverse-surface": "#e3e2e2",
                    "on-error-container": "#ffdad6",
                    "outline-variant": "#544433",
                    "tertiary": "#d2d0d2",
                    "on-secondary": "#303032",
                    "on-primary-fixed": "#2b1700",
                    "inverse-primary": "#885200",
                    "primary-container": "#ff9f0a",
                    "background": "#121414",
                    "on-tertiary-fixed": "#1b1b1d",
                    "surface-container-high": "#292a2a",
                    "on-tertiary": "#303032",
                    "on-secondary-fixed-variant": "#474649",
                    "tertiary-fixed-dim": "#c8c6c8",
                    "surface-variant": "#343535",
                    "on-primary-container": "#673d00",
                    "surface-dim": "#121414"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter-grid": "12px",
                    "margin-main": "16px",
                    "stack-gap": "8px",
                    "section-padding": "24px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "display-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "caption": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["15px", {"lineHeight": "20px", "letterSpacing": "-0.24px", "fontWeight": "400"}],
                    "label-sm": ["13px", {"lineHeight": "18px", "letterSpacing": "-0.08px", "fontWeight": "400"}],
                    "display-lg": ["94px", {"lineHeight": "112px", "letterSpacing": "-0.02em", "fontWeight": "300"}],
                    "headline-md": ["22px", {"lineHeight": "28px", "letterSpacing": "0.35px", "fontWeight": "600"}],
                    "headline-lg": ["34px", {"lineHeight": "41px", "letterSpacing": "0.37px", "fontWeight": "700"}],
                    "caption": ["11px", {"lineHeight": "13px", "letterSpacing": "0.06px", "fontWeight": "500"}],
                    "body-lg": ["17px", {"lineHeight": "22px", "letterSpacing": "-0.41px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; -webkit-font-smoothing: antialiased; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .message-bubble { position: relative; border-radius: 20px; padding: 12px 16px; max-width: 75%; font-family: 'Inter', sans-serif; }
        .bubble-right { background-color: #34C759; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-left { background-color: #333333; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* Pulse Animation for Map */
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }
        .user-pulse {
            width: 12px; height: 12px; background: #007AFF; border: 2px solid white; border-radius: 50%;
            box-shadow: 0 0 0 rgba(0, 122, 255, 0.4); animation: pulse-blue 2s infinite;
        }
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 122, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0); }
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <!-- Top App Bar -->
    <header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-3xl border-b-[0.5px] border-outline-variant/30 flex justify-between items-center px-4 h-14">
        <div onclick="window.location.href='../emergency_settings/code.html'" class="flex items-center gap-1 text-primary active:opacity-70 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-[28px]">chevron_left</span>
            <span class="font-body-lg text-body-lg">Back</span>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center mb-0.5">
                <span class="material-symbols-outlined text-[20px] text-on-surface">person</span>
            </div>
            <span id="header-contact-name" class="font-caption text-caption text-on-surface">Sarah Miller</span>
        </div>
        <div class="text-primary active:opacity-70 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-[24px]">info</span>
        </div>
    </header>

    <!-- Chat Canvas -->
    <main class="flex-1 overflow-y-auto px-4 pt-20 pb-24 flex flex-col gap-4">
        <div class="text-center py-4">
            <span class="font-caption text-caption text-secondary uppercase tracking-widest">Today 9:41 AM</span>
        </div>
        <!-- Incoming Message -->
        <div class="message-bubble bubble-left">
            <p class="font-body-md text-body-md">Are you okay? Where are you?</p>
        </div>
        <!-- Outgoing Live Location Message -->
        <div class="flex flex-col items-end gap-1 w-full">
            <div class="message-bubble bubble-right w-[280px] p-0 overflow-hidden shadow-lg border border-white/10">
                <!-- Map Preview Card -->
                <div class="relative h-48 w-full bg-surface-container-highest overflow-hidden">
                    <div class="absolute inset-0 bg-[#121212] flex items-center justify-center">
                        <div class="absolute inset-0 opacity-40 mix-blend-screen pointer-events-none" style="background-image: radial-gradient(circle at 50% 50%, #222 1px, transparent 1px); background-size: 20px 20px;"></div>
                        <div class="user-pulse z-10"></div>
                        <div class="absolute bottom-2 left-2 bg-black/40 backdrop-blur-md px-2 py-0.5 rounded text-[10px] font-medium text-white/80">
                            Legal
                        </div>
                    </div>
                </div>
                <!-- Message Text -->
                <div class="p-3 bg-primary-container">
                    <p id="bubble-text" class="font-body-md text-body-md text-on-primary-container leading-snug">
                        Emergency! Here is my live location: <span class="underline">Location Link</span>
                    </p>
                </div>
            </div>
            <span id="delivered-status" class="font-caption text-caption text-secondary pr-1">Delivered</span>
        </div>
    </main>

    <!-- Bottom Input Bar (iOS Style) -->
    <footer class="fixed bottom-0 w-full z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-3xl border-t-[0.5px] border-outline-variant/30 pb-safe">
        <div class="flex items-end gap-2 px-3 py-2 max-w-full">
            <button class="mb-1 p-1 text-on-surface-variant active:scale-90 transition-transform">
                <span class="material-symbols-outlined">add_circle</span>
            </button>
            <!-- Message Input Area -->
            <div class="flex-1 relative flex items-center bg-surface-container-low border border-outline-variant/30 rounded-[20px] min-h-[36px] px-3 py-1.5">
                <div id="input-draft" class="flex-1 font-body-md text-body-md text-on-surface outline-none">
                    Emergency! Here is my live location: [Location Link]
                </div>
                <button class="ml-2 w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center active:scale-90 transition-transform">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_upward</span>
                </button>
            </div>
        </div>
    </footer>

    <script>
        window.addEventListener('load', () => {
            const name = localStorage.getItem('emergency_contact_name') || 'Sarah Miller';
            const message = localStorage.getItem('emergency_message') || 'Emergency! I need assistance at my location...';
            
            // Coordinates representing current dynamic location
            const lat = (37.7749 + (Math.random() - 0.5) * 0.01).toFixed(4);
            const lng = (-122.4194 + (Math.random() - 0.5) * 0.01).toFixed(4);
            const locationLink = `https://maps.google.com/?q=${lat},${lng}`;

            // Update Header Name
            const headerName = document.getElementById('header-contact-name');
            if (headerName) headerName.innerText = name;

            // Update Outgoing Message Bubble
            const bubbleText = document.getElementById('bubble-text');
            if (bubbleText) {
                bubbleText.innerHTML = `${message} <a href="${locationLink}" target="_blank" class="underline text-blue-300 font-semibold break-all">${locationLink}</a>`;
            }

            // Update Input Area draft view
            const inputDraft = document.getElementById('input-draft');
            if (inputDraft) {
                inputDraft.innerText = `${message} ${locationLink}`;
            }

            // Simulate slight delay before status flips to Sent/Delivered
            const status = document.getElementById('delivered-status');
            if (status) {
                status.innerText = "Sending...";
                setTimeout(() => {
                    status.innerText = "Delivered";
                }, 1500);
            }
        });

        // Click shake animation on status details
        document.getElementById('delivered-status').addEventListener('click', function() {
            this.classList.add('animate-pulse');
            setTimeout(() => this.classList.remove('animate-pulse'), 1000);
        });

        // Atmospheric micro glitch particle visual effect
        const canvas = document.createElement('div');
        canvas.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:40;';
        document.body.appendChild(canvas);
        
        function createGlitch() {
            const bar = document.createElement('div');
            bar.style.cssText = `position:absolute; width:100%; height:1px; background:rgba(255,159,10,0.05); top:${Math.random()*100}%; left:0;`;
            canvas.appendChild(bar);
            setTimeout(() => bar.remove(), 100);
        }
        setInterval(createGlitch, 3000);
    </script>
</body>
</html>
