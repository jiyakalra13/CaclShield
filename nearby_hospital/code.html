<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
    <title>Nearby Hospital</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        :root {
            --ios-blur: blur(25px);
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #000000;
        }
        .ios-glass {
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
        }
        .map-gradient-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#ffb868",
                        "secondary-container": "#474649",
                        "primary-fixed": "#ffddbb",
                        "on-primary": "#482900",
                        "secondary-fixed-dim": "#c8c6c8",
                        "on-secondary-fixed": "#1b1b1d",
                        "inverse-on-surface": "#2f3131",
                        "outline": "#a28d79",
                        "surface-container-lowest": "#0d0e0f",
                        "on-tertiary-fixed-variant": "#474649",
                        "primary-fixed-dim": "#ffb868",
                        "secondary-fixed": "#e4e2e4",
                        "surface-bright": "#383939",
                        "on-error": "#690005",
                        "on-tertiary-container": "#464648",
                        "surface-container": "#1e2020",
                        "on-background": "#e3e2e2",
                        "surface": "#121414",
                        "surface-container-highest": "#343535",
                        "on-surface": "#e3e2e2",
                        "error-container": "#93000a",
                        "surface-container-low": "#1a1c1c",
                        "error": "#ffb4ab",
                        "tertiary-container": "#b6b4b6",
                        "on-primary-fixed-variant": "#673d00",
                        "tertiary-fixed": "#e4e2e4",
                        "on-secondary-container": "#b6b4b7",
                        "on-surface-variant": "#dac3ad",
                        "secondary": "#c8c6c8",
                        "primary": "#ffc688",
                        "inverse-surface": "#e3e2e2",
                        "on-error-container": "#ffdad6",
                        "outline-variant": "#544433",
                        "tertiary": "#d2d0d2",
                        "on-secondary": "#303032",
                        "on-primary-fixed": "#2b1700",
                        "inverse-primary": "#885200",
                        "primary-container": "#ff9f0a",
                        "background": "#121414",
                        "on-tertiary-fixed": "#1b1b1d",
                        "surface-container-high": "#292a2a",
                        "on-tertiary": "#303032",
                        "on-secondary-fixed-variant": "#474649",
                        "tertiary-fixed-dim": "#c8c6c8",
                        "surface-variant": "#343535",
                        "on-primary-container": "#673d00",
                        "surface-dim": "#121414"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter-grid": "12px",
                        "margin-main": "16px",
                        "stack-gap": "8px",
                        "section-padding": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "caption": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["15px", {"lineHeight": "20px", "letterSpacing": "-0.24px", "fontWeight": "400"}],
                        "label-sm": ["13px", {"lineHeight": "18px", "letterSpacing": "-0.08px", "fontWeight": "400"}],
                        "display-lg": ["94px", {"lineHeight": "112px", "letterSpacing": "-0.02em", "fontWeight": "300"}],
                        "headline-md": ["22px", {"lineHeight": "28px", "letterSpacing": "0.35px", "fontWeight": "600"}],
                        "headline-lg": ["34px", {"lineHeight": "41px", "letterSpacing": "0.37px", "fontWeight": "700"}],
                        "caption": ["11px", {"lineHeight": "13px", "letterSpacing": "0.06px", "fontWeight": "500"}],
                        "body-lg": ["17px", {"lineHeight": "22px", "letterSpacing": "-0.41px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-black text-on-surface selection:bg-primary/30 overflow-hidden h-screen">
    <!-- Top App Bar -->
    <header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-3xl border-b-[0.5px] border-outline-variant/30 flex justify-between items-center px-4 h-11">
        <div onclick="window.location.href='../emergency_settings/code.html'" class="flex items-center active:opacity-70 transition-opacity active:scale-95 transition-transform duration-100 cursor-pointer text-primary">
            <span class="material-symbols-outlined text-[24px]">chevron_left</span>
            <span class="font-body-lg text-body-lg ml-1">Back</span>
        </div>
        <h1 class="font-headline-md text-headline-md text-on-surface">Emergency Map</h1>
        <div class="flex items-center active:opacity-70 transition-opacity active:scale-95 transition-transform duration-100">
            <span class="material-symbols-outlined text-primary dark:text-primary">more_horiz</span>
        </div>
    </header>

    <!-- Full Screen Map Canvas -->
    <main class="relative w-full h-full pt-11 pb-16 overflow-hidden">
        <div class="absolute inset-0 bg-surface-container-lowest overflow-hidden">
            <img class="w-full h-full object-cover grayscale brightness-50 contrast-125" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB5zL_ME7FIMjlSsFBQ3Rr8zqEjKkfhMouSl3LoJfBa_Xi2i4N8HaFBmwZnZz6h5gAbmVAKIUjam3yMWAm1hS9tplogR6cbD2H7sOe6767uT63fUuV13jNcUXlY-25YMrTqwj3AHW7EZ8QQR2z7SY0tDOvaxTpUvkb2pv9jdtJoCk3JkKnCcQaP5M_TuCBShh3Qq6nUYTQSxOjxH_zwUFRa4GWrvcdi96WweQazFeTagtdQhhqgkiBMEx3qPUKDJyWWSGrQVTUUn4ms"/>
            <div class="map-gradient-overlay absolute inset-0"></div>
            
            <!-- Mercy Medical Center Pin -->
            <div class="absolute top-[35%] left-[55%] animate-pulse">
                <div class="relative flex flex-col items-center">
                    <div class="bg-red-500 p-1.5 rounded-full shadow-lg shadow-red-500/20 ring-2 ring-white/20">
                        <span class="material-symbols-outlined text-white text-[16px]" style="font-variation-settings: 'FILL' 1;">medical_services</span>
                    </div>
                    <div class="w-0.5 h-2 bg-red-500"></div>
                </div>
            </div>
            
            <!-- User Location -->
            <div class="absolute top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2">
                <div class="relative">
                    <div class="absolute inset-0 bg-blue-500 rounded-full animate-ping opacity-25"></div>
                    <div class="w-4 h-4 bg-blue-500 rounded-full border-2 border-white shadow-md relative z-10"></div>
                </div>
            </div>
        </div>

        <!-- Floating UI Controls -->
        <div class="absolute top-16 right-4 flex flex-col gap-2">
            <button class="ios-glass w-11 h-11 rounded-lg flex items-center justify-center text-on-surface shadow-lg border border-white/5 active:scale-90 transition-transform">
                <span class="material-symbols-outlined">layers</span>
            </button>
            <div class="ios-glass rounded-lg flex flex-col shadow-lg border border-white/5 overflow-hidden">
                <button class="w-11 h-11 flex items-center justify-center text-on-surface active:bg-white/10 transition-colors border-b border-white/5">
                    <span class="material-symbols-outlined">add</span>
                </button>
                <button class="w-11 h-11 flex items-center justify-center text-on-surface active:bg-white/10 transition-colors">
                    <span class="material-symbols-outlined">remove</span>
                </button>
            </div>
            <button class="ios-glass w-11 h-11 rounded-lg flex items-center justify-center text-[#007AFF] shadow-lg border border-white/5 active:scale-90 transition-transform">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">near_me</span>
            </button>
        </div>

        <!-- Closest Hospital Card -->
        <div class="absolute bottom-20 left-4 right-4 z-40">
            <div class="ios-glass rounded-2xl p-4 shadow-2xl border border-white/10 ring-1 ring-black/5 flex items-center justify-between transition-all hover:bg-surface-variant/90">
                <div class="flex items-center gap-4">
                    <div class="bg-red-500/20 p-3 rounded-full flex items-center justify-center text-red-500 shadow-inner">
                        <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">medical_services</span>
                    </div>
                    <div>
                        <h2 class="font-headline-md text-headline-md text-white">Mercy Medical Center</h2>
                        <p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
                            <span class="material-symbols-outlined text-[14px]">near_me</span>
                            0.5 miles away
                        </p>
                    </div>
                </div>
                <button class="bg-[#007AFF] hover:bg-[#0066CC] active:scale-95 transition-all px-5 py-2.5 rounded-full flex items-center gap-2 text-white font-semibold shadow-lg shadow-blue-500/20">
                    <span class="material-symbols-outlined text-[20px]">directions</span>
                    <span class="font-label-sm text-label-sm">Directions</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 w-full z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-3xl border-t-[0.5px] border-outline-variant/30 flex justify-around items-center h-16 px-6 pb-safe">
        <button onclick="window.location.href='../calcshield_calculator/code.html'" class="flex flex-col items-center gap-1 active:opacity-70 transition-opacity active:scale-90 transition-transform duration-150 text-secondary dark:text-secondary">
            <span class="material-symbols-outlined text-2xl">calculate</span>
        </button>
        <button class="flex flex-col items-center gap-1 active:opacity-70 transition-opacity active:scale-90 transition-transform duration-150 text-secondary dark:text-secondary">
            <span class="material-symbols-outlined text-2xl">history</span>
        </button>
        <button class="flex flex-col items-center gap-1 active:opacity-70 transition-opacity active:scale-90 transition-transform duration-150 text-primary-container dark:text-primary-container">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">security</span>
        </button>
        <button onclick="window.location.href='../emergency_settings/code.html'" class="flex flex-col items-center gap-1 active:opacity-70 transition-opacity active:scale-90 transition-transform duration-150 text-secondary dark:text-secondary">
            <span class="material-symbols-outlined text-2xl">settings</span>
        </button>
    </nav>
</body>
</html>
